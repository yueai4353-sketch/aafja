<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>春锦梨 (v1.0.2-debug)</title>
    
    <!-- iOS WebApp Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="春锦梨" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Prevent iOS dark mode overrides -->
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#00ffff" />
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon.png" />

    <!-- iOS splash screens (prevent white flash) -->
    <style>
      /* 全屏布局：html/body 铺满视口，使用 100dvh 确保 iOS 紧贴屏幕边缘 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        position: fixed; /* 锁死根层级，防止 iOS 橡皮筋滚动 */
      }
      #root {
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        position: fixed;
        left: 0;
        top: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
